<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Max Turbo - Berus AI</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="contenedor-principal">
        <div id="info-inicio" class="card-inicio">
            <h1>BERUS AI</h1>
            <p class="resumen">
                Núcleo de inteligencia oficial de **Max Turbo**. 
                Sistema de gestión avanzado desarrollado por Oscar Jesús y su equipo.
            </p>
            <button onclick="irAlRegistro()">INICIAR SISTEMA</button>
        </div>
    </div>

    <div id="pantalla-registro" class="oculto">
        <div class="card-inicio">
            <h2>Registro de Acceso</h2>
            <input type="email" id="correo" placeholder="Correo Electrónico">
            <input type="password" id="pass" placeholder="Contraseña">
            <button onclick="registrar()">REGISTRAR Y ENTRAR</button>
        </div>
    </div>

    <div id="pantalla-chat" class="oculto">
        <div class="header-chat">MAX TURBO - MODULO MULTIMEDIA ACTIVO</div>
        <div id="caja-chat"></div>
        <div class="entrada-chat">
            <input type="text" id="pregunta" placeholder="Escribe 'avances' para ver videos...">
            <button onclick="enviarMensaje()">ENVIAR</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
