<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Max Turbo - Berus AI</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="contenedor-principal">
        <video id="video-intro" autoplay muted playsinline preload="auto">
            <source src="intro.mp4" type="video/mp4">
        </video>

        <div id="info-inicio" class="card-inicio oculto-fade">
            <h1>BERUS AI</h1>
            <p class="resumen">
                Bienvenido a la inteligencia oficial de Max Turbo. 
                Asistente avanzado diseñado por Oscar Jesús y su equipo.
            </p>
            <button onclick="irAlRegistro()">INICIAR SISTEMA</button>
        </div>
    </div>

    <div id="pantalla-registro" class="oculto">
        <div class="card-inicio">
            <h2>Acceso al Sistema</h2>
            <input type="email" id="correo" placeholder="Usuario">
            <input type="password" id="pass" placeholder="Contraseña">
            <button onclick="registrar()">ENTRAR</button>
        </div>
    </div>

    <div id="pantalla-chat" class="oculto">
        <div id="caja-chat"></div>
        <div class="entrada-chat">
            <input type="text" id="pregunta" placeholder="Escribe a Berus...">
            <button onclick="enviarMensaje()">Enviar</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
