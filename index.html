<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Max Turbo - Berus AI</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <video id="video-intro" autoplay muted playsinline preload="auto">
    <source src="intro.mp4" type="video/mp4">
    Tu navegador no soporta videos.
</video>

        <div id="info-inicio" class="card-inicio oculto-fade">
            <h1>BERUS AI</h1>
            <p class="resumen">
                Bienvenido a la inteligencia oficial de Max Turbo. 
                Berus es un asistente avanzado diseñado para gestionar proyectos, 
                responder dudas del equipo y evolucionar hacia el futuro multimedia.
            </p>
            <button onclick="irAlRegistro()">INICIAR SISTEMA</button>
        </div>
    </div>

    <div id="pantalla-registro" class="oculto">
        <div class="card-inicio">
            <h2>Registro de Usuario</h2>
            <input type="email" id="correo" placeholder="Correo Electrónico">
            <input type="password" id="pass" placeholder="Contraseña">
            <button onclick="registrar()">REGISTRAR Y ENTRAR</button>
        </div>
    </div>

    <div id="pantalla-chat" class="oculto">
        <div id="caja-chat"></div>
        <div class="entrada-chat">
            <input type="text" id="pregunta" placeholder="Escribe a Berus...">
            <button onclick="enviarMensaje()">Enviar</button>
        </div>
    </div>

    <div id="pantalla-admin" class="oculto">
        <div class="card-admin">
            <h2>Bóveda de Seguridad</h2>
            <div id="lista-cuentas"></div>
            <hr>
            <div id="registro-chat-admin"></div>
            <br>
            <button onclick="volver()" style="background:gray;">VOLVER</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
